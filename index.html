<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance System</title>
  <link rel="stylesheet" href="css/style.css?v=88">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script src="js/db.js?v=96"></script>
  <script src="js/app.js?v=101"></script>
  <script src="js/employee.js?v=102"></script>
  <script src="js/admin.js?v=105"></script>
  <script>
    // 先用本地数据启动应用
    App.init();
    // 后台从云端同步最新数据（合并，不覆盖本地）
    DB.init().then(function() {
      console.log('[PMS] 云端数据同步完成');
      // 同步完成后刷新会话和界面，确保密码等变更生效
      App.refreshAfterSync();
    }).catch(function(e) {
      console.warn('[PMS] 云端同步失败，使用本地数据:', e);
    });
  </script>
</body>
</html>
